<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Reparaciones</title>
</head>
<body>

<h2>Panel de Administración</h2>

<input id="codigo" placeholder="Código">
<input id="cliente" placeholder="Cliente">
<input id="modelo" placeholder="Modelo">
<input id="estado" placeholder="Estado">
<input id="costo" placeholder="Costo">

<button onclick="guardar()">Guardar</button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDZV9pPEU5E5m6PNcomQyqo37ycbSDf4hI",
  authDomain: "mobilereparaciones-e55e6.firebaseapp.com",
  databaseURL: "https://mobilereparaciones-e55e6-default-rtdb.firebaseio.com",
  projectId: "mobilereparaciones-e55e6",
  storageBucket: "mobilereparaciones-e55e6.firebasestorage.app",
  messagingSenderId: "918152977833",
  appId: "1:918152977833:web:566fa1d096d475142338b8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function guardar(){
  db.collection("reparaciones").add({
    codigo: document.getElementById("codigo").value,
    cliente: document.getElementById("cliente").value,
    modelo: document.getElementById("modelo").value,
    estado: document.getElementById("estado").value,
    costo: document.getElementById("costo").value,
    fechaIngreso: new Date().toLocaleDateString()
  });

  alert("Guardado");
}
</script>

</body>
</html>
